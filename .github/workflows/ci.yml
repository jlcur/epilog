name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: epilog-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Create test environment file
        run: |
          cat <<'EOF' > .env.test
          PORT=9998
          PINO_LOG_LEVEL=fatal
          DB_NAME=epilog-test
          DB_HOST=localhost
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_PORT=5432
          EOF

      - name: Run tests
        run: npm test

      - name: Deploy to Coolify
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: >-
          curl --fail -X GET
          -H "Authorization: Bearer ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}"
          "${{ secrets.COOLIFY_WEBHOOK_URL }}"
